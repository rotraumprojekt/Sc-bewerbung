<svg viewBox="0 0 440 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rotraum">
  <defs>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neonGlow)">
    <rect x="50" y="14" width="340" height="64" rx="2" fill="none" stroke="#d60538" stroke-width="6"/>
    <text x="220" y="168" text-anchor="middle" font-family="'Familjen Grotesk', Helvetica, Arial, sans-serif" font-weight="500" font-size="58" letter-spacing="1" fill="none" stroke="#d60538" stroke-width="2.6">rotraum</text>
  </g>
</svg>
